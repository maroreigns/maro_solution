<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <div class="nav-container">

    <h1 class="logo">Maro Solution</h1>

    <ul class="nav-links" id="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="listings.html">Listings</a></li>
      <li><a href="add.html">Add Business</a></li>
    </ul>

    <div class="hamburger" id="hamburger">
      <span></span>
      <span></span>
      <span></span>
    </div>

  </div>
</nav>

<!-- FORM PAGE -->
<main class="form-page">

  <div class="form-container">

    <h2>Add Your Business</h2>

    <form id="add-form">

      <!-- ✅ IMAGE UPLOAD -->
      <div class="image-upload">
        <label>Upload Profile Picture</label>
        <input type="file" id="image" accept="image/*">
      </div>

      <!-- BUSINESS NAME -->
      <input type="text" id="name" placeholder="Business Name" required>

      <!-- CATEGORY -->
      <select id="category" required>
        <option value="">Select Category</option>
      </select>

      <!-- STATE -->
      <select id="state" required>
        <option value="">Select State</option>
      </select>

      <!-- LGA -->
      <select id="lga" required>
        <option value="">Select LGA</option>
      </select>

      <!-- PHONE -->
      <input type="tel" id="phone" placeholder="Phone Number" required>

      <!-- BUTTON -->
      <button type="submit">Add Business</button>

    </form>

    <p id="message"></p>

  </div>

</main>

<!-- FOOTER -->
 <footer class="footer">

  <div class="footer-container">

    <!-- BRAND -->
    <div class="footer-section">
      <h2 class="footer-logo">Maro Solution</h2>
      <p>Find trusted services near you easily and quickly.</p>
    </div>

    <!-- CONTACT -->
    <div class="footer-section">
      <h3>Contact</h3>
      <p>Email: marosolution@gmail.com</p>
    </div>

    <!-- SOCIALS -->
    <div class="footer-section">
      <h3>Follow Us</h3>
      <div class="social-links">
        <a href="#" target="_blank">Facebook</a>
        <a href="#" target="_blank">Instagram</a>
      </div>
    </div>

  </div>

  <div class="footer-bottom">
    <p>© 2026 Maro Solution. All rights reserved.</p>
  </div>

</footer>

<script src="script.js"></script>

</body>
</html>
